source = $XDG_CONFIG_HOME/hypr/conf/matugen.conf

general {
  grace = 0
  disable_loading_bar = true
  hide_cursor = true
  ignore_empty_input = true
}

background {
  monitor = eDP-1
  path = $image
  blur_passes = 2
}

input-field {
  monitor = eDP-1
  size = 20%, 5%
  outline_thickness = 3

  outer_color = $primary
  inner_color = $surface_container
  font_color = $on_surface_variant
  check_color = $tertiary
  fail_color = $error
  fade_on_empty = false

  position = 0, -150
  halign = center
  valign = center
}

label {
  monitor = eDP-1
  text = $TIME12
  font_size = 120
  font_family = JetBrainsMono Nerd Font ExtraBold
  font_color = $on_surface
  position = 0, -300
  halign = center
  valign = top
}

label {
  monitor = eDP-1
  text = Hi there, $USER
  font_size = 25
  font_family = ComicShannsMono Nerd Font
  font_color = $on_surface
  position = 0, -50
  halign = center
  valign = center
}
