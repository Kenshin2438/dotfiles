# -----------------------------------------------------
#                       Input
# -----------------------------------------------------
input {
  kb_layout = us

  follow_mouse = 1

  touchpad {
    natural_scroll = true
    disable_while_typing = true
    clickfinger_behavior = true
  }
}
gestures {
  workspace_swipe = true
  workspace_swipe_fingers = 3
}
# -----------------------------------------------------
#                       Layouts
# -----------------------------------------------------
general {
  gaps_in = 2
  gaps_out = 4
  border_size = 2

  col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
  col.inactive_border = rgba(595959aa)

  resize_on_border = false
  allow_tearing = false

  layout = dwindle
}
dwindle {
  pseudotile = true
  preserve_split = true
  special_scale_factor = 0.85
}
decoration {
  rounding = 5
  rounding_power = 2

  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }
  blur {
    enabled = true
    size = 3
    passes = 1

    vibrancy = 0.1696
  }
}
master {
  new_status = master
}
# -----------------------------------------------------
#                       Misc
# -----------------------------------------------------
misc {
  disable_hyprland_logo = true
  font_family = Mono
}
xwayland {
  force_zero_scaling = true
}
