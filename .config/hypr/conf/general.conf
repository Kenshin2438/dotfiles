# -----------------------------------------------------
#                       Input
# -----------------------------------------------------
input {
  kb_layout = us

  follow_mouse = 1

  touchpad {
    natural_scroll = true
    disable_while_typing = true
    clickfinger_behavior = true
  }
}
gesture = 3, horizontal, workspace
# -----------------------------------------------------
#                       Layouts
# -----------------------------------------------------
general {
  gaps_in = 2
  gaps_out = 4
  border_size = 2

  col.active_border = $primary $tertiary 45deg
  col.inactive_border = $outline_variant

  resize_on_border = false
  layout = dwindle
}
dwindle {
  # pseudotile = true
  preserve_split = true
  special_scale_factor = 0.85
}
decoration {
  rounding = 5
  rounding_power = 2

  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = $source_color
  }
  blur {
    enabled = true
  }
}
master {
  new_status = master
}
# -----------------------------------------------------
#                       Misc
# -----------------------------------------------------
misc {
  disable_hyprland_logo = true
  font_family = Mono
}
xwayland {
  force_zero_scaling = true
}
