proxy-providers:
  FLYCAT:
    type: http
    interval: 86400
    proxy: DIRECT
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      lazy: true
      expected-status: 204

external-controller: 127.0.0.1:9090
external-ui: metacubexd
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

mixed-port: 7890
ipv6: false
allow-lan: false
mode: rule
log-level: info
tcp-concurrent: true
find-process-mode: strict

geodata-mode: true
geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"
geo-auto-update: true
geo-update-interval: 24

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "rule-set:private-domain"
    - "rule-set:cn-domain"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver:
    - "https://doh.pub/dns-query"
    - "https://dns.alidns.com/dns-query"
  nameserver:
    - "https://8.8.8.8/dns-query#Proxy"
    - "https://1.1.1.1/dns-query#Proxy"
  fallback:
    - "tls://223.5.5.5:853"
    - "https://223.5.5.5/dns-query"
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: false
  dns-hijack: [any:53, tcp://any:53]

proxy-groups:
  - name: 默认
    type: select
    proxies: [新加坡, 香港, 日本, 美国, 其它地区, DIRECT]
  - name: Google
    type: select
    proxies: [默认, 新加坡, 香港, 日本, 美国, 其它地区, DIRECT]
  - name: Spotify
    type: select
    proxies: [默认, 新加坡, 香港, 日本, 美国, 其它地区, DIRECT]
  - name: Github
    type: select
    proxies: [默认, 新加坡, 香港, 日本, 美国, 其它地区, DIRECT]
  - name: 其它
    type: select
    proxies: [默认, 新加坡, 香港, 日本, 美国, 其它地区, DIRECT]
  - name: 全部节点
    type: select
    include-all: true
    exclude-type: direct
  - name: 香港
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)香港"
  - name: 日本
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)日本"
  - name: 美国
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)美国"
  - name: 新加坡
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)新加坡"
  - name: 其它地区
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:香港|日本|新加坡|美国)).*"

rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
rule-providers:
  private-domain:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
  private-ip:
    <<: *ip
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"
  cn-domain:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"
  cn-ip:
    <<: *ip
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
  google-domain:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"
  google-ip:
    <<: *ip
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/google.mrs"
  google-scholar:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google-scholar.mrs"
  category-scholar-cn:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-scholar-cn.mrs"
  category-scholar-!cn:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-scholar-!cn.mrs"
  bilibili-domain:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/bilibili.mrs"
  github-domain:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"
  spotify-domain:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/spotify.mrs"
  geolocation-!cn:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"
  adblock:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.githubusercontent.com/REIJI007/AdBlock_Rule_For_Clash/main/adblock_reject.mrs"

rules:
  - AND,((DST-PORT,443),(NETWORK,UDP)),REJECT
  - RULE-SET,adblock,REJECT
  # 局域网
  - RULE-SET,private-domain,DIRECT
  - RULE-SET,private-ip,DIRECT,no-resolve
  # 学术
  - RULE-SET,google-scholar,Google
  - RULE-SET,category-scholar-cn,DIRECT
  - RULE-SET,category-scholar-!cn,DIRECT
  # 应用
  - RULE-SET,bilibili-domain,DIRECT
  - RULE-SET,github-domain,Github
  - RULE-SET,spotify-domain,Spotify
  - RULE-SET,google-domain,Google
  - RULE-SET,google-ip,Google
  # 其它
  - RULE-SET,cn-domain,DIRECT
  - RULE-SET,cn-ip,DIRECT
  - RULE-SET,geolocation-!cn,其它
  - MATCH,其它
