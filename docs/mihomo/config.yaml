proxy-providers:
  FLYCAT:
    type: http
    interval: 86400
    proxy: DIRECT
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      lazy: true
      expected-status: 204

external-controller: 127.0.0.1:9090
external-ui: metacubexd
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

mixed-port: 7890
ipv6: false
allow-lan: false
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

geodata-mode: true
geodata-loader: standard
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"
geo-auto-update: true
geo-update-interval: 24

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - "geosite:private"
    - "geosite:cn"
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback:
    - tls://8.8.4.4
    - tls://1.1.1.1
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver:
    - system
  nameserver-policy:
    geosite:cn,private:
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    geosite:category-ads-all: rcode://success

tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: false
  dns-hijack: [any:53, tcp://any:53]

proxy-groups:
  - name: 默认
    type: select
    proxies: [新加坡, 香港, 日本, 美国, 其它地区, DIRECT]
  - name: Google
    type: select
    proxies: [默认, 新加坡, 香港, 日本, 美国, 其它地区, DIRECT]
  - name: Spotify
    type: select
    proxies: [默认, 新加坡, 香港, 日本, 美国, 其它地区, DIRECT]
  - name: Github
    type: select
    proxies: [默认, 新加坡, 香港, 日本, 美国, 其它地区, DIRECT]
  - name: 其它
    type: select
    proxies: [默认, 新加坡, 香港, 日本, 美国, 其它地区, DIRECT]
  - name: 全部节点
    type: select
    include-all: true
    exclude-type: direct
  - name: 香港
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)香港"
  - name: 日本
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)日本"
  - name: 美国
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)美国"
  - name: 新加坡
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)新加坡"
  - name: 其它地区
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:香港|日本|新加坡|美国)).*"

rules:
  # 广告
  - GEOSITE,category-ads-all,REJECT
  # 局域网
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  # 国内
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  # 学术
  - GEOSITE,category-scholar-cn,DIRECT
  - GEOSITE,google-scholar,Google
  # 应用
  - GEOSITE,onedrive,DIRECT
  - GEOSITE,microsoft@cn,DIRECT
  - GEOSITE,bilibili,DIRECT
  - GEOSITE,github,Github
  - GEOSITE,spotify,Spotify
  - GEOSITE,google,Google
  # 其它
  - DST-PORT,80/8080/443/8443,默认
  - MATCH,其它
