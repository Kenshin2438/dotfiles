proxy-providers:
  flycat:
    url: ""
    type: http
    interval: 86400
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300

proxies:
  - name: "直连"
    type: direct
    udp: true

external-controller: 127.0.0.1:9090
external-ui: metacubexd
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

mixed-port: 7890
ipv6: false
allow-lan: false
mode: rule
log-level: info
tcp-concurrent: true
find-process-mode: strict

geodata-mode: true
geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"
  asn: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"
geo-auto-update: true
geo-update-interval: 24

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

dns:
  enable: true
  ipv6: false
  listen: "0.0.0.0:2438"
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 114.114.114.114
    - "tcp://223.5.5.5"
  fallback:
    - "tls://223.5.5.5:853"
    - "https://223.5.5.5/dns-query"
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4

proxy-groups:
  - name: 默认
    type: select
    proxies: [新加坡, 香港, 台湾, 日本, 美国, 其它地区, 直连]
  - name: Google
    type: select
    proxies: [默认, 新加坡, 香港, 台湾, 日本, 美国, 其它地区, 直连]
  - name: Telegram
    type: select
    proxies: [默认, 新加坡, 香港, 台湾, 日本, 美国, 其它地区, 直连]
  - name: Twitter
    type: select
    proxies: [默认, 新加坡, 香港, 台湾, 日本, 美国, 其它地区, 直连]
  - name: 哔哩哔哩
    type: select
    proxies: [直连]
  - name: YouTube
    type: select
    proxies: [默认, 新加坡, 香港, 台湾, 日本, 美国, 其它地区, 直连]
  - name: Spotify
    type: select
    proxies: [默认, 新加坡, 香港, 台湾, 日本, 美国, 其它地区, 直连]
  - name: Github
    type: select
    proxies: [默认, 新加坡, 香港, 台湾, 日本, 美国, 其它地区, 直连]
  - name: 其他
    type: select
    proxies: [默认, 新加坡, 香港, 台湾, 日本, 美国, 其它地区, 直连]
  - name: 全部节点
    type: select
    include-all: true
    exclude-type: direct
  - name: 国内
    type: select
    proxies: [直连]

  - name: 香港
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)香港"
  - name: 台湾
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)台湾"
  - name: 日本
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)日本"
  - name: 美国
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)美国"
  - name: 新加坡
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)新加坡"
  - name: 其它地区
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:|香港|台湾|日本|新加坡|美国)).*"

rules:
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,github_domain,Github
  - RULE-SET,twitter_domain,Twitter
  - RULE-SET,youtube_domain,YouTube
  - RULE-SET,google_domain,Google
  - RULE-SET,telegram_domain,Telegram
  - RULE-SET,bilibili_domain,哔哩哔哩
  - RULE-SET,spotify_domain,Spotify
  - RULE-SET,cn_domain,国内
  - RULE-SET,geolocation-!cn,其他
  - RULE-SET,google_ip,Google
  - RULE-SET,telegram_ip,Telegram
  - RULE-SET,twitter_ip,Twitter
  - RULE-SET,cn_ip,国内
  - MATCH,其他

rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
rule-providers:
  private_domain:
    <<: *domain
    url: "https://ghproxy.cn/https://raw.github.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
